# ──────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Cartify
#
# Jobs:
#   1. branch-lint   – validate branch name format on every push / PR
#   2. commit-lint   – validate commit messages on push / PR
#   3. test          – run Selenium test suite
#
# Triggers:
#   • push  to any branch
#   • pull_request targeting main or develop
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Restrict default permissions — each job grants only what it needs
permissions: {}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Branch-lint
  #    Pattern: <verb>-<segment>[-<segment>...]
  #    Segments may contain lowercase letters, digits and hyphens.
  #    Special branches: main, master, develop, dev, staging,
  #                      release/<name>, hotfix/<name>
  # ────────────────────────────────────────────────────────────────────────────
  branch-lint:
    name: branch-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (config file only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/branch-lint.config
          sparse-checkout-cone-mode: false

      - name: Check branch name
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Branch: $BRANCH"

          # Read pattern from config file (single source of truth)
          PATTERN=$(grep '^BRANCH_PATTERN' .github/branch-lint.config \
            | sed 's/^BRANCH_PATTERN *= *"//;s/"$//')

          if [[ -z "$PATTERN" ]]; then
            echo "❌ Could not read BRANCH_PATTERN from .github/branch-lint.config"
            exit 1
          fi

          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "✅ Branch '$BRANCH' matches the allowed pattern."
            exit 0
          fi

          echo ""
          echo "❌ Branch name '$BRANCH' is invalid."
          echo ""
          echo "Branch names must follow one of these patterns:"
          echo "  Special : main | master | develop | dev | staging"
          echo "            release/<name> | hotfix/<name>"
          echo "  Feature : <verb>-<word>[-<word>...]"
          echo "            where each segment is lowercase letters and/or digits"
          echo ""
          echo "Examples of valid feature branches:"
          echo "  feat-user-authentication"
          echo "  fix-cart-bug-42"
          echo "  refactor-order-service-v2"
          echo "  add-oauth2-login"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Commit-lint
  #    Uses commitlint with the project's commitlint.config.js.
  #    On a PR it lints every commit in the PR; on a push it lints HEAD.
  # ────────────────────────────────────────────────────────────────────────────
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to compare commits in a PR

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint commits (PR)
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose

      - name: Lint commits (push)
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          # Validate SHA format to prevent injection
          [[ "$BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]] || [[ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]] || { echo "Invalid before SHA"; exit 1; }
          [[ "$AFTER_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid after SHA"; exit 1; }

          # Lint all new commits in this push (handles force-pushes with multiple commits)
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            # New branch — lint only HEAD
            npx commitlint --from "HEAD~1" --to "HEAD" --verbose
          else
            npx commitlint \
              --from "$BEFORE_SHA" \
              --to   "$AFTER_SHA" \
              --verbose
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Test — Unit (Jest + Supertest) + Playwright + Selenium
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    needs: [branch-lint, commit-lint]
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        run: npm run seed

      # ── Unit tests ───────────────────────────────────────────────────────
      #- name: unit-tests
      #  run: npm run test:unit:coverage

      #- name: unit-test-coverage-report
      #  if: always()
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: coverage-report
      #    path: coverage/
      #    retention-days: 14

      - name: start-server
        run: |
          npm start &
          SERVER_READY=false
          for i in {1..20}; do
            if curl -sf http://localhost:3000/api/products > /dev/null; then
              SERVER_READY=true
              break
            fi
            echo "Waiting for server… ($i)"
            sleep 2
          done

      # ── Playwright ──────────────────────────────────────────────────────
      # - name: install-playwright-deps
      #   run: npx playwright install --with-deps chromium

      # - name: run-playwright-tests
      #   run: npm run test:playwright

      # - name: Upload Playwright report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: playwright-report
      #     path: playwright-report/
      #     retention-days: 14

      # ── Selenium ────────────────────────────────────────────────────────
      - name: setup-selenium-chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          install-chromedriver: true

      - name: run-selenium-tests
        run: mkdir -p tests/selenium/results && npm run test:selenium:ci
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: publish-selenium-report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Selenium Tests
          path: tests/selenium/results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: upload-selenium-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: tests/selenium/results/
          retention-days: 14
